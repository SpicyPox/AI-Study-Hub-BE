spring:
  # Datasource Configuration
  datasource:
    url: jdbc:postgresql://localhost:5432/aistudyhub
    username: postgres
    password: 12345
    driver-class-name: org.postgresql.Driver

  # JPA & Hibernate Configuration
  jpa:
    hibernate:
      # Let Flyway manage the schema, Hibernate should only validate it
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        # Important: Tell Hibernate which schema to use for its operations
        default_schema: ai_study_hub

  # Flyway Migration Configuration
  flyway:
    # Enable Flyway
    enabled: true
    # The default schema for Flyway's metadata table
    default-schema: ai_study_hub
    # Schemas to be managed by Flyway
    schemas: ai_study_hub
    # Automatically create the schema if it doesn't exist
    create-schemas: true
