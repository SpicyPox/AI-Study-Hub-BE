spring:
  # Datasource Configuration
  datasource:
    url: jdbc:postgresql://localhost:5432/aistudyhub
    username: postgres
    password: 12345
    driver-class-name: org.postgresql.Driver

  # JPA & Hibernate Configuration
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: ai_study_hub

  # Flyway Migration Configuration
  flyway:
    enabled: true
    default-schema: ai_study_hub
    schemas: ai_study_hub
    create-schemas: true

  # Mail Sender Configuration
  mail:
    host: smtp.gmail.com
    port: 587
    username: your-email@gmail.com # <-- THAY ĐỔI: Email của bạn
    password: your-app-password   # <-- THAY ĐỔI: Mật khẩu ứng dụng của bạn
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# Application Specific Properties
application:
  security:
    jwt:
      secret-key: "404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970"
      expiration: 900000 # 15 minutes
      refresh-token:
        expiration: 604800000 # 7 days
  
  # Frontend URL for password reset link
  client-url: http://localhost:3000 # <-- THAY ĐỔI: URL của Frontend
